<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wallaroo FC — Compliments Slip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital@1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:     #C8102E;
    --navy:    #0A1F3D;
    --cream:   #F5F1E8;
    --charcoal:#15171C;
    --grey:    #595D63;
    --line:    #DAD3C2;
  }

  @page {
    size: 210mm 99mm; /* DL = one-third A4 */
    margin: 0;
  }

  body {
    width: 210mm;
    height: 99mm;
    background: white;
    display: flex;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }

  /* LEFT BAND */
  .cs-band {
    width: 52mm;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8mm;
    flex-shrink: 0;
    position: relative;
  }

  .cs-band::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--red);
  }

  .cs-crest {
    width: 18mm;
    height: 18mm;
    margin-bottom: 4mm;
  }

  .cs-clubname {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 8.5pt;
    letter-spacing: 0.1em;
    color: white;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
  }

  .cs-est {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 7pt;
    color: rgba(200,16,46,0.9);
    margin-top: 2mm;
    text-align: center;
  }

  /* RIGHT CONTENT */
  .cs-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8mm 10mm;
  }

  .cs-heading {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 18pt;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 0.95;
    margin-bottom: 2mm;
  }

  .cs-heading em {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    color: var(--red);
    text-transform: none;
    letter-spacing: -0.01em;
  }

  .cs-rule {
    height: 2px;
    background: var(--line);
    margin-bottom: 5mm;
  }

  .cs-message-label {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 7.5pt;
    letter-spacing: 0.12em;
    color: var(--grey);
    text-transform: uppercase;
    margin-bottom: 3mm;
  }

  .cs-lines {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: 0;
  }

  .cs-line {
    border-bottom: 1px solid var(--line);
    height: 7mm;
  }

  .cs-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 3mm;
    padding-top: 2mm;
    border-top: 1px solid var(--line);
  }

  .cs-footer-text {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 6.5pt;
    color: var(--grey);
  }

  .cs-footer-url {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 7pt;
    letter-spacing: 0.1em;
    color: var(--red);
    text-transform: uppercase;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

  <!-- LEFT BAND -->
  <div class="cs-band">
    <div class="cs-crest">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" width="100%" height="100%">
        <path fill="white" d="M50.4 78.5a75.1 75.1 0 0 0-28.5 6.9l24.2-65.7c.7-2 1.9-3.2 3.4-3.2h29c1.5 0 2.7 1.2 3.4 3.2l24.2 65.7s-11.6-7-28.5-7L67 45.5c-.4-1.7-1.6-2.8-2.9-2.8-1.3 0-2.5 1.1-2.9 2.7L50.4 78.5Zm-1.1 28.2Zm-4.2-20.2c-2 6.6-.6 15.8 4.2 20.2a17.5 17.5 0 0 1 .2-.7 5.5 5.5 0 0 1 5.7-4.5c2.8.1 4.3 1.5 4.7 4.7.2 1.1.2 2.3.2 3.5v.4c0 2.7.7 5.2 2.2 7.4a13 13 0 0 0 5.7 4.9v-.3l-.2-.3c-1.8-5.6-.5-9.5 4.4-12.8l1.5-1a73 73 0 0 0 3.2-2.2 16 16 0 0 0 6.8-11.4c.3-2 .1-4-.6-6l-.8.6-1.6 1a37 37 0 0 1-22.4 2.7c-5-.7-9.7-2-13.2-6.2Z"/>
      </svg>
    </div>
    <div class="cs-clubname">Wallaroo<br>Football<br>Club</div>
    <div class="cs-est">est. 1879</div>
  </div>

  <!-- RIGHT -->
  <div class="cs-content">
    <div class="cs-heading">With<br><em>compliments.</em></div>
    <div class="cs-rule"></div>
    <div class="cs-message-label">Message</div>
    <div class="cs-lines">
      <div class="cs-line"></div>
      <div class="cs-line"></div>
      <div class="cs-line"></div>
    </div>
    <div class="cs-footer">
      <span class="cs-footer-text">Wallaroo Oval · Cornish Terrace · Wallaroo SA 5556</span>
      <span class="cs-footer-url">wallaroo-fc.vercel.app</span>
    </div>
  </div>

</body>
</html>
